name: CI

on:
  push:
    branches: [ master, development ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    name: "PHPUnit: MW ${{ matrix.mw }}, PHP ${{ matrix.php }}"
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mw: 'REL1_43'
            php: 8.1
            experimental: false
          - mw: 'REL1_44'
            php: 8.1
            experimental: false
          - mw: 'REL1_44'
            php: 8.3
            experimental: false
          - mw: 'REL1_45'
            php: 8.2
            experimental: false
          - mw: 'REL1_45'
            php: 8.3
            experimental: false
          - mw: 'master'
            php: 8.3
            experimental: true

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediawiki

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          tools: composer

      - name: Cache MediaWiki
        id: cache-mediawiki
        uses: actions/cache@v5
        with:
          path: |
            mediawiki
            !mediawiki/extensions/
            !mediawiki/vendor/
          key: mw_${{ matrix.mw }}-php${{ matrix.php }}-v20

      - name: Cache Composer cache
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}

      - uses: actions/checkout@v6
        with:
          path: EarlyCopy

      - name: Install MediaWiki
        if: steps.cache-mediawiki.outputs.cache-hit != 'true'
        working-directory: ~
        run: bash EarlyCopy/.github/workflows/installWiki.sh ${{ matrix.mw }}

      - uses: actions/checkout@v6
        with:
          path: mediawiki/extensions/RobloxAPI

      - name: Composer update
        run: composer update

      - name: Run PHPUnit
        run: composer phpunit:entrypoint -- --group RobloxAPI -c tests/phpunit/suite.xml

      - name: Run parser tests
        run: php tests/parser/parserTests.php --file=extensions/RobloxAPI/tests/parser/parserTests.txt

      - name: Run phan
        run: composer run phan
  # We only want to run this during full CI for now; in the future, this will be moved to lint-check.yml
  banana-lint:
    name: "Lint message files"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
        name: Install dependencies
      - run: npm test
        name: Run banana
